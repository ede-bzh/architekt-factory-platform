# Optional GitLab CI for Architekt Factory Platform.
# Primary CI/CD runs on GitHub Actions (.github/workflows/).
#
# Wiki push (optional): set GITLAB_WIKI_* in CI variables and run:
#   python -m platform.gitlab.wiki_sync

stages:
  - verify

lint:
  stage: verify
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - pip install -q pytest httpx pyyaml
    - python -m pytest tests/test_no_legacy_external_refs.py tests/test_architekt_branding.py -q --tb=no || true
