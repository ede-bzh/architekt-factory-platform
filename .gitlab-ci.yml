# GitLab CI — Architekt Factory Platform
# La Poste internal mirror: no automatic deploy from this repo by default.
# Use tools/laposte-sync/ for one-way sync from upstream when needed.

stages:
  - validate

validate-skeleton:
  stage: validate
  image: alpine
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
  script:
    - echo "Architekt platform skeleton — configure LAPOSTE_* deploy when internal infra is ready."

