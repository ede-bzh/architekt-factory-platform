# Default values for architekt-platform
replicaCount: 1

image:
  repository: ghcr.io/architekt-factory/platform
  tag: "1.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8090

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: architekt.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: "2"
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

env:
  PLATFORM_LLM_PROVIDER: demo
  LOG_LEVEL: warning
  API_RATE_LIMIT: "120"

# Mount API keys from existing secret
envFromSecret: ""
# Example: create secret first, then set envFromSecret: architekt-secrets
# kubectl create secret generic architekt-secrets \
#   --from-literal=AZURE_OPENAI_API_KEY=sk-... \
#   --from-literal=GITHUB_WEBHOOK_SECRET=whsec_...

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  mountPath: /app/data

nodeSelector: {}
tolerations: []
affinity: {}

healthcheck:
  path: /api/health
  initialDelaySeconds: 15
  periodSeconds: 30
