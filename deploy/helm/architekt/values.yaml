# Default values for architekt-platform (Wave E — container package architekt_platform)
replicaCount: 1

image:
  repository: ghcr.io/ede-bzh/architekt-factory-platform
  tag: "2.3.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8090

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: architekt.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: "2"
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Matches platform/deploy/Dockerfile (architekt_platform on port 8090)
env:
  PLATFORM_LLM_PROVIDER: demo
  LOG_LEVEL: warning
  API_RATE_LIMIT: "120"
  PYTHONPATH: /app
  OTEL_SERVICE_NAME: architekt-platform
  PG_DB: architekt_platform

# Mount API keys from existing secret
envFromSecret: ""
# Example: create secret first, then set envFromSecret: architekt-secrets
# kubectl create secret generic architekt-secrets \
#   --from-literal=ARCHITEKT_API_KEY=... \
#   --from-literal=AZURE_OPENAI_API_KEY=sk-... \
#   --from-literal=GITHUB_WEBHOOK_SECRET=whsec_...

persistence:
  enabled: true
  storageClass: ""
  size: 5Gi
  mountPath: /app/data

nodeSelector: {}
tolerations: []
affinity: {}

healthcheck:
  path: /api/health
  initialDelaySeconds: 15
  periodSeconds: 30
