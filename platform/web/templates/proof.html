{% extends "base.html" %}

{% block content %}
<div class="main-area" style="padding:2rem;max-width:720px">
    <h1 style="font-size:1.6rem;font-weight:700;margin-bottom:0.5rem">Proof of Concepts</h1>
    <p style="color:var(--text-secondary);margin-bottom:1.5rem;font-size:0.9rem">
        Wave 2 experiments — internal previews, not production features.
    </p>

    <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:0.75rem">
        <li style="padding:1rem;border-radius:10px;background:var(--bg-secondary);border:1px solid var(--border)">
            <a href="/finops" style="font-weight:600;color:var(--purple-light);text-decoration:none">FinOps — LLM cost dashboard</a>
            <p style="margin:0.35rem 0 0;font-size:0.85rem;color:var(--text-secondary)">
                Total spend and breakdown by provider from <code>llm_traces</code>.
            </p>
        </li>
    </ul>
</div>
{% endblock %}
