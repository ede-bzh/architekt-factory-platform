<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ brand_name }}{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX for dynamic updates -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        architekt: {
                            bg: '#0f0a1a',
                            accent: '#a855f7',
                            surface: '#1a1228',
                            muted: '#6b21a8',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --architekt-bg: #0f0a1a;
            --architekt-accent: #a855f7;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6b21a8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a855f7; }

        .log-container {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.4;
        }

        @keyframes pulse-accent {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-green {
            animation: pulse-accent 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .progress-bar {
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>
<body class="h-full bg-[#0f0a1a] text-purple-50">
    <nav class="bg-[#1a1228] border-b border-purple-900/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/legacy" class="flex items-center space-x-2">
                        <span class="text-2xl text-[#a855f7]">◆</span>
                        <span class="font-bold text-xl text-white">{{ brand_name }}</span>
                    </a>
                    <div class="hidden md:flex ml-10 space-x-4">
                        <a href="/legacy"
                           class="px-3 py-2 rounded-md text-sm font-medium text-purple-200 hover:bg-purple-900/40
                                  {% if request.url.path == '/legacy' %}bg-purple-900/50 text-[#a855f7]{% endif %}">
                            Legacy monitor
                        </a>
                        <a href="/tasks"
                           class="px-3 py-2 rounded-md text-sm font-medium text-purple-200 hover:bg-purple-900/40
                                  {% if request.url.path == '/tasks' %}bg-purple-900/50 text-[#a855f7]{% endif %}">
                            Tasks
                        </a>
                        <a href="{{ platform_url }}/monitoring"
                           class="px-3 py-2 rounded-md text-sm font-medium text-purple-200 hover:bg-purple-900/40"
                           target="_blank" rel="noopener">
                            Platform monitoring ↗
                        </a>
                        <a href="{{ platform_url }}/proof"
                           class="px-3 py-2 rounded-md text-sm font-medium text-purple-200 hover:bg-purple-900/40"
                           target="_blank" rel="noopener">
                            Proof ↗
                        </a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/" class="text-xs text-purple-400 hover:text-[#a855f7] hidden sm:inline">About</a>
                    <span id="clock" class="text-sm text-purple-400"></span>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-900/60 text-[#a855f7] border border-purple-700/50">
                        Legacy
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-[#1a1228] border-t border-purple-900/50 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-wrap justify-between items-center gap-2 text-sm text-purple-400">
                <span>{{ brand_name }} — legacy · primary UI <a href="{{ platform_url }}" class="text-[#a855f7] hover:underline">{{ platform_url }}</a></span>
                <span>Auto-refresh: 30s</span>
            </div>
        </div>
    </footer>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString();
        }
        updateClock();
        setInterval(updateClock, 1000);

        setInterval(() => {
            htmx.trigger(document.body, 'refresh');
        }, 30000);
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
