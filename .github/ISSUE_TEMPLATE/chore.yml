name: Chore
description: Tâche technique sans nouvelle fonctionnalité (rebrand, refactor, CI, kit activation, etc.)
title: "[P?] <area> — "
labels: ["type:chore"]
body:
  - type: input
    id: phase
    attributes:
      label: Phase
      placeholder: "0-Rebrand / 1-Catalog / 2-Practices / 3-Pilot / 4-OnDemand"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priorité
      options:
        - Must
        - Should
        - Could
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Étape 1
        - [ ] Étape 2
        - [ ] Test / validation
