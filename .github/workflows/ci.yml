name: CI

on:
  push:
    branches: [main, "cursor/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/requirements.txt

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx fastapi uvicorn pyyaml
          pip install -r platform/requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check platform/ tests/

      - name: Bandit
        
        run: |
          pip install bandit
          bandit -r platform/ -lll -q -c bandit.yaml

      - name: Secret scan
        run: bash scripts/ci/secret-scan.sh

      - name: Dependency audit (pip-audit)
        
        run: |
          pip install pip-audit
          pip-audit -r platform/requirements.txt --desc on

      - name: Generate SBOM (CycloneDX)
        continue-on-error: true
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements -i platform/requirements.txt -o sbom-platform.json

      - name: Upload SBOM artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: sbom-platform
          path: sbom-platform.json
          if-no-files-found: ignore

      - name: Run unit tests (core gate)
        env:
          PLATFORM_LLM_PROVIDER: demo
          PLATFORM_ENV: test
        run: |
          PYTHONPATH=. pytest \
            tests/test_demo.py \
            tests/test_events.py \
            tests/test_deterministic_tools.py \
            tests/test_adaptive_intelligence.py \
            tests/test_adversarial_l0.py \
            tests/test_plugins.py \
            tests/test_llm_cache.py \
            tests/test_platform_api.py \
            tests/test_health_api.py \
            tests/test_rate_limit.py \
            tests/test_uruk_rtk.py \
            tests/test_workers.py \
            tests/test_b_features.py \
            tests/test_api_key_alias.py \
            tests/test_llm_budget.py \
            tests/test_quality_pdf.py \
            tests/test_adversarial_l2.py \
            tests/test_adversarial_l2_llm.py \
            tests/test_finops_margin.py \
            tests/test_prometheus_architekt.py \
            tests/test_ai_audit_logs.py \
            tests/test_case_study.py \
            tests/test_architekt_delivery_audit.py \
            tests/test_architekt_branding.py \
            tests/test_i18n_en_fr.py \
            tests/test_no_legacy_external_refs.py \
            tests/test_readme_en_fr.py \
            tests/test_monitoring_live_perf.py \
            -q

  mutation:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: platform/requirements.txt

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx fastapi uvicorn pyyaml mutmut
          pip install -r platform/requirements.txt

      - name: Mutation test (api_key)
        env:
          PLATFORM_LLM_PROVIDER: demo
          PLATFORM_ENV: test
        run: |
          if [ ! -f platform/auth/api_key.py ]; then
            echo "Skip: platform/auth/api_key.py not found"
            exit 0
          fi
          timeout 900 mutmut run \
            --paths-to-mutate=platform/auth/api_key.py \
            --max-children=2 \
            --no-progress \
            || echo "mutmut finished with non-zero exit (optional job)"


  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sbom-platform
          path: .
        continue-on-error: true
      - name: Release summary
        run: |
          echo "## Release ${GITHUB_REF_NAME}" >> "$GITHUB_STEP_SUMMARY"
          test -f sbom-platform.json && echo "- SBOM: sbom-platform.json attached" >> "$GITHUB_STEP_SUMMARY"
          echo "- Gate: pytest + bandit + pip-audit (see CI test job)" >> "$GITHUB_STEP_SUMMARY"
