name: Deploy → Azure Prod

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.AZURE_IP }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo -e "Host *\n  StrictHostKeyChecking yes\n  ConnectTimeout 15" >> ~/.ssh/config

      - name: Rsync to Azure VM
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          SHA=$(git rev-parse --short HEAD)
          echo "${TAG:-$SHA}:${SHA}" > platform/VERSION
          rsync -az --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'data/' \
            --exclude 'workspaces/' \
            platform cli skills dashboard mcp_lrm \
            azureadmin@${{ secrets.AZURE_IP }}:/home/azureadmin/architekt_update/

      - name: Deploy into container
        run: |
          ssh azureadmin@${{ secrets.AZURE_IP }} '
            CONTAINER=$(docker ps --format "{{.Names}}" | grep -E "platform-platform" | head -1)
            [ -z "$CONTAINER" ] && echo "ERROR: no container" && exit 1
            PKG_DIR=architekt_platform
            docker cp /home/azureadmin/architekt_update/platform/. $CONTAINER:/app/$PKG_DIR/
            docker exec $CONTAINER find /app/$PKG_DIR -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            docker stop $CONTAINER && sleep 3 && docker start $CONTAINER
            sleep 8
            docker exec $CONTAINER curl -sf http://localhost:8099/api/health | grep -q "\"status\":\"ok\""
          '
