name: Deploy → OVH Demo

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_KEY }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.OVH_IP }}" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host *
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: Rsync to OVH
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          SHA=$(git rev-parse --short HEAD)
          echo "${TAG:-$SHA}:${SHA}" > platform/VERSION

          rsync -az --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude 'data/' \
            --exclude 'workspace/' \
            platform cli skills dashboard mcp_lrm \
            debian@${{ secrets.OVH_IP }}:/opt/software-factory/
          rsync -az Dockerfile docker-compose.yml debian@${{ secrets.OVH_IP }}:/opt/software-factory/

      - name: Disk cleanup (Docker cache + old images)
        run: |
          ssh debian@${{ secrets.OVH_IP }} '
            docker builder prune --all --force 2>/dev/null || true
            docker image prune -a --force --filter "until=48h" 2>/dev/null || true
            docker container prune --force 2>/dev/null || true
            df -h /
          '

      - name: Deploy (hotpatch)
        run: |
          ssh debian@${{ secrets.OVH_IP }} '
            CONTAINER=$(docker ps --format "{{.Names}}" | grep -i platform | head -1)
            docker cp /opt/software-factory/platform/. $CONTAINER:/app/platform/
            docker exec $CONTAINER find /app/platform -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
            docker exec -e PYTHONPATH= -w /tmp $CONTAINER pip install -r /app/platform/requirements.txt -q 2>/dev/null || true
            docker stop $CONTAINER && sleep 2 && docker start $CONTAINER
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8090/api/health 2>/dev/null || echo 000)
            echo "Health: $STATUS"
            test "$STATUS" = "200"
          '
