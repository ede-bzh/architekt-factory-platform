[pytest]
pythonpath = .
testpaths = tests
addopts = -q --tb=short
    --ignore=tests/ab_fractal_test.py
    --ignore=tests/run_ab_test.py
    --ignore=tests/test_fractal_decomposition.py
    --ignore=tests/test_mcp.py
norecursedirs = _FINARY node_modules .git platform/tests/e2e
markers =
    endurance: long-running endurance tests
    chaos: chaos / fault-injection tests
    live: tests against a live server (need --live)
